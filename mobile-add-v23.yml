name: 📱 手機新增景點餐廳 v23

on:
  workflow_dispatch:
    inputs:
      day:
        description: 放在哪一天？
        required: true
        type: choice
        options: [8/2, 8/3, 8/4, 8/5, 8/6, 8/7, 備選]
      category:
        description: 類別
        required: true
        type: choice
        options: [景點, 餐廳, 咖啡廳, 甜點, 市場／市集, 活動, 購物]
      name:
        description: 景點或店家名稱
        required: true
        type: string
      description:
        description: 簡短介紹／攻略
        required: true
        type: string
      map_url:
        description: Google Maps 分享連結
        required: true
        type: string
      photo_url:
        description: 照片網址（可留空，缺圖會顯示地圖預覽）
        required: false
        type: string
      instagram:
        description: IG Hashtag 或完整連結（可留空）
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-content-update
  cancel-in-progress: false

jobs:
  add:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: 新增或更新資料
        env:
          INPUT_DAY: ${{ inputs.day }}
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_NAME: ${{ inputs.name }}
          INPUT_DESCRIPTION: ${{ inputs.description }}
          INPUT_MAP_URL: ${{ inputs.map_url }}
          INPUT_PHOTO_URL: ${{ inputs.photo_url }}
          INPUT_INSTAGRAM: ${{ inputs.instagram }}
        run: node scripts/mobile-add.mjs
      - name: 發布更新
        env:
          COMMIT_NAME: ${{ inputs.name }}
        run: |
          git config user.name "okinawa-trip bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/extras.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "手機新增：${COMMIT_NAME}"
          git push
